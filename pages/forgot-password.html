<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaCare - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
    <style>
        :root {
            --primary-color: #1a88e1;
            --bg-color: #f8faff;
            --text-dark: #333;
            --text-gray: #777;
            --card-bg: #ffffff;
            --input-bg: #f3f6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        .background-decor {
            position: fixed;
            color: rgba(0, 0, 0, 0.03);
            z-index: -1;
        }
        .left-icon { font-size: 250px; left: -50px; top: 10%; transform: rotate(-15deg); }
        .right-icon { font-size: 300px; right: -50px; bottom: 5%; transform: rotate(10deg); }

        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .logo-box {
            background: var(--primary-color);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(26, 136, 225, 0.3);
        }

        .header h1 {
            color: #0c4a7e;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: left;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .lang-switch {
            font-size: 12px;
            color: var(--primary-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 20px; }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        label { font-size: 13px; font-weight: 600; color: var(--text-dark); }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #aaa;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: none;
            background: var(--input-bg);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .reset-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(26, 136, 225, 0.4);
        }

        .reset-btn:hover { background: #1572c0; transform: translateY(-1px); }

        .footer { margin-top: 30px; }
        .footer p { font-size: 14px; color: var(--text-gray); }
        .footer a { color: var(--primary-color); text-decoration: none; font-weight: bold; }

        .version { font-size: 10px !important; color: #ccc !important; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="background-decor left-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <div class="background-decor right-icon"><i class="fa-solid fa-heart"></i></div>

    <div class="main-container">
        <header class="header">
            <div class="logo-box">
                <i class="fa-solid fa-droplet"></i>
            </div>
            <h1>DiaCare</h1>
            <p>Your intelligent partner in diabetes management and daily wellness.</p>
        </header>

        <div class="login-card">
            <div class="card-header">
                <h2>Reset Password</h2>
                <div class="lang-switch">
                    <i class="fa-solid fa-gear"></i>
                    <span>العربية</span>
                </div>
            </div>
            <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

            <form id="resetForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                </div>

                <button type="submit" class="reset-btn">
                    Send Reset Link <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>

        <footer class="footer">
            <p>Remember your password? <a href="login.html">Back to Login</a></p>
            <p class="version">© 2024 DIACARE V2.4.0 • SECURE CLINICAL GATEWAY</p>
        </footer>
    </div>

    <script src="../js/forgot-password.js"></script>
</body>
</html>
